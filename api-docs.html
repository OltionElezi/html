function highlightParams(path) {
  return path.replace(/\{([^}]+)\}/g, '<span class="param">{$1}</span>');
}

function renderAll(filter, search) {
  const container = document.getElementById('content');
  const noResults = document.getElementById('noResults');
  let html = '';
  let totalEndpoints = 0;
  let totalComponents = 0;
  let visibleEndpoints = 0;

  DATA.forEach(proj => {
    let projHtml = '';
    let projCount = 0;

    proj.components.forEach(comp => {
      totalComponents++;
      let compHtml = '';
      let compCount = 0;

      comp.endpoints.forEach(ep => {
        totalEndpoints++;
        const methodLower = ep.method.toLowerCase();
        const matchesFilter = filter === 'all' || methodLower === filter;
        const matchesSearch = !search ||
          ep.path.toLowerCase().includes(search) ||
          ep.method.toLowerCase().includes(search) ||
          ep.desc.toLowerCase().includes(search) ||
          comp.name.toLowerCase().includes(search);

        if (matchesFilter && matchesSearch) {
          compCount++;
          visibleEndpoints++;
          compHtml += `<div class="endpoint">
            <span class="method ${methodLower}">${ep.method}</span>
            <span class="path">${highlightParams(ep.path)}</span>
            <span class="desc">${ep.desc}</span>
          </div>`;
        }
      });

      if (compCount > 0) {
        projCount += compCount;
        const compId = (proj.project + comp.name).replace(/[^a-zA-Z0-9]/g, '');
        projHtml += `<div class="component">
          <div class="component-header open" onclick="toggleComponent('${compId}')">
            <h3>${comp.name} <span class="count">${compCount}</span></h3>
            <span class="arrow">\u25B6</span>
          </div>
          <div class="endpoints show" id="comp-${compId}">${compHtml}</div>
        </div>`;
      }
    });

    if (projCount > 0) {
      const projId = proj.project.replace(/[^a-zA-Z0-9]/g, '');
      html += `<div class="project-section">
        <div class="project-header" onclick="toggleProject('${projId}')">
          <h2><span class="project-icon">${proj.icon}</span>${proj.project} <span class="badge">${projCount} endpoints</span></h2>
          <span class="chevron">\u25BC</span>
        </div>
        <div id="proj-${projId}">${projHtml}</div>
      </div>`;
    }
  });

  container.innerHTML = html;
  noResults.classList.toggle('hidden', visibleEndpoints > 0);

  if (!filter || filter === 'all') {
    document.getElementById('totalEndpoints').textContent = totalEndpoints;
    document.getElementById('totalComponents').textContent = totalComponents;
  }
}

function toggleComponent(id) {
  const el = document.getElementById('comp-' + id);
  const header = el.previousElementSibling;
  el.classList.toggle('show');
  header.classList.toggle('open');
}

function toggleProject(id) {
  const el = document.getElementById('proj-' + id);
  const header = el.previousElementSibling;
  if (el.style.display === 'none') {
    el.style.display = '';
    header.classList.remove('collapsed');
  } else {
    el.style.display = 'none';
    header.classList.add('collapsed');
  }
}

let currentFilter = 'all';
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderAll(currentFilter, document.getElementById('search').value.toLowerCase().trim());
  });
});

let debounce;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(debounce);
  debounce = setTimeout(() => {
    renderAll(currentFilter, e.target.value.toLowerCase().trim());
  }, 200);
});
